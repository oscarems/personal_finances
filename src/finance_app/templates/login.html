<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — Personal Finances</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Fraunces', 'serif'],
                        body: ['Inter Tight', 'system-ui', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter Tight', system-ui, sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-neutral-950 text-white flex items-center justify-center px-4">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <h1 class="font-display text-3xl font-semibold tracking-tight">Personal Finances</h1>
            <p class="text-neutral-500 text-sm mt-2">Ingresa tu contraseña para continuar</p>
        </div>

        <form method="POST" action="/auth/login" class="space-y-5">
            {% if error %}
            <div class="rounded-xl border border-red-500/30 bg-red-500/10 px-4 py-3 text-sm text-red-400">
                {{ error }}
            </div>
            {% endif %}

            <div>
                <label for="password" class="block text-xs font-medium text-neutral-400 mb-1.5">Contraseña</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    autofocus
                    class="w-full rounded-xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white placeholder-neutral-600 outline-none transition focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/30"
                    placeholder="Introduce tu contraseña"
                >
            </div>

            <button
                type="submit"
                class="w-full rounded-xl bg-white text-neutral-900 px-4 py-3 text-sm font-semibold transition hover:bg-neutral-200 active:bg-neutral-300"
            >
                Entrar
            </button>
        </form>
    </div>
</body>
</html>
