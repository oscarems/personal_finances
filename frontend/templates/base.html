<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Personal Finances{% endblock %}</title>

    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind Configuration -->

                            100: '#CCFBF1',
                            200: '#99F6E4',
                            300: '#5EEAD4',
                            400: '#2DD4BF',
                            500: '#14B8A6', // Teal vibrante - Color principal
                            600: '#0D9488',
                            700: '#0F766E',
                            800: '#115E59',
                            900: '#134E4A',
                        },
                        secondary: {
                            50: '#EEF2FF',
                            100: '#E0E7FF',
                            200: '#C7D2FE',
                            300: '#A5B4FC',
                            400: '#818CF8',
                            500: '#6366F1',
                            600: '#4F46E5', // Índigo profundo - Profesionalismo
                            700: '#4338CA',
                            800: '#3730A3',
                            900: '#312E81',
                        },
                        success: {
                            50: '#F0FDF4',
                            100: '#DCFCE7',
                            200: '#BBF7D0',
                            300: '#86EFAC',
                            400: '#4ADE80',
                            500: '#22C55E', // Verde vibrante moderno
                            600: '#16A34A',
                            700: '#15803D',
                            800: '#166534',
                            900: '#14532D',
                        },
                        danger: {
                            50: '#FFF1F2',
                            100: '#FFE4E6',
                            200: '#FECDD3',
                            300: '#FDA4AF',
                            400: '#FB7185',
                            500: '#F43F5E', // Rose - Rojo más suave y moderno
                            600: '#E11D48',
                            700: '#BE123C',
                            800: '#9F1239',
                            900: '#881337',
                        },
                        warning: {
                            50: '#FFFBEB',
                            100: '#FEF3C7',
                            200: '#FDE68A',
                            300: '#FCD34D',
                            400: '#FBBF24',
                            500: '#F59E0B', // Ámbar - Advertencia cálida
                            600: '#D97706',
                            700: '#B45309',
                            800: '#92400E',
                            900: '#78350F',
                        },
                        accent: {
                            50: '#FDF2F8',
                            100: '#FCE7F3',
                            200: '#FBCFE8',
                            300: '#F9A8D4',
                            400: '#F472B6',
                            500: '#EC4899', // Pink/Fucsia - Personalidad única
                            600: '#DB2777',
                            700: '#BE185D',
                            800: '#9D174D',
                            900: '#831843',
                        },
                        neutral: {
                            50: '#F8FAFC',
                            100: '#F1F5F9',
                            200: '#E2E8F0',
                            300: '#CBD5E1',
                            400: '#94A3B8',
                            500: '#64748B', // Slate - Grises más modernos
                            600: '#475569',
                            700: '#334155',
                            800: '#1E293B',
                            900: '#0F172A',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 2px 8px rgba(0, 0, 0, 0.06)',
                        'medium': '0 4px 16px rgba(0, 0, 0, 0.1)',
                        'strong': '0 8px 32px rgba(0, 0, 0, 0.12)',
                        'glow-primary': '0 0 20px rgba(20, 184, 166, 0.3)',
                        'glow-accent': '0 0 20px rgba(236, 72, 153, 0.3)',
                        'inner-soft': 'inset 0 2px 4px rgba(0, 0, 0, 0.06)',
                    },
                    borderRadius: {
                        'card': '16px',
                        'button': '10px',
                        'xl': '20px',
                        '2xl': '24px',
                    },
                    backdropBlur: {
                        'xs': '2px',
                    }
                }
            }
        }
    </script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* Sistema de diseño global moderno */
        :root {
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-spring: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            --shadow-soft: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-medium: 0 4px 16px rgba(0, 0, 0, 0.1);
            --shadow-strong: 0 8px 32px rgba(0, 0, 0, 0.12);
        }

        * {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        /* Animaciones suaves y micro-interacciones */
        .budget-bar {
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Componentes de botón modernos con efectos */
        .btn-primary {
            @apply px-6 py-3 bg-gradient-to-r from-primary-500 to-primary-600 text-white
                   rounded-button font-semibold shadow-md
                   hover:from-primary-600 hover:to-primary-700 hover:shadow-lg hover:scale-105
                   active:scale-95 transition-all duration-200;
        }

        .btn-success {
            @apply px-6 py-3 bg-gradient-to-r from-success-500 to-success-600 text-white
                   rounded-button font-semibold shadow-md
                   hover:from-success-600 hover:to-success-700 hover:shadow-lg hover:scale-105
                   active:scale-95 transition-all duration-200;
        }

        .btn-danger {
            @apply px-6 py-3 bg-gradient-to-r from-danger-500 to-danger-600 text-white
                   rounded-button font-semibold shadow-md
                   hover:from-danger-600 hover:to-danger-700 hover:shadow-lg hover:scale-105
                   active:scale-95 transition-all duration-200;
        }

        .btn-secondary {
            @apply px-6 py-3 bg-white text-neutral-700 rounded-button font-semibold
                   border-2 border-neutral-200 shadow-sm
                   hover:bg-neutral-50 hover:border-neutral-300 hover:shadow-md
                   active:scale-95 transition-all duration-200;
        }

        .btn-accent {
            @apply px-6 py-3 bg-gradient-to-r from-accent-500 to-accent-600 text-white
                   rounded-button font-semibold shadow-md
                   hover:from-accent-600 hover:to-accent-700 hover:shadow-lg hover:scale-105
                   active:scale-95 transition-all duration-200;
        }

        /* Cards con efectos glassmorphism y profundidad */
        .card {
            @apply bg-white rounded-card shadow-soft hover:shadow-medium
                   transition-all duration-300 border border-neutral-100
                   hover:border-primary-100;
        }

        .card-hover-lift {
            @apply bg-white rounded-card shadow-soft hover:shadow-strong
                   transition-all duration-300 border border-neutral-100
                   hover:-translate-y-1 hover:border-primary-200;
        }

        .card-gradient-primary {
            @apply bg-gradient-to-br from-primary-400 via-primary-500 to-primary-600
                   rounded-card shadow-medium text-white border border-primary-300/20
                   hover:shadow-glow-primary transition-all duration-300;
        }

        .card-gradient-success {
            @apply bg-gradient-to-br from-success-400 via-success-500 to-success-600
                   rounded-card shadow-medium text-white border border-success-300/20;
        }

        .card-gradient-accent {
            @apply bg-gradient-to-br from-accent-400 via-accent-500 to-accent-600
                   rounded-card shadow-medium text-white border border-accent-300/20
                   hover:shadow-glow-accent transition-all duration-300;
        }

        .card-gradient-secondary {
            @apply bg-gradient-to-br from-secondary-400 via-secondary-500 to-secondary-600
                   rounded-card shadow-medium text-white border border-secondary-300/20;
        }

        .card-glass {
            @apply bg-white/80 backdrop-blur-md rounded-card shadow-medium border border-white/20;
        }

        /* Inputs modernos con mejor feedback */
        .input-field {
            @apply w-full px-4 py-3 border-2 border-neutral-200 rounded-button
                   focus:ring-4 focus:ring-primary-100 focus:border-primary-500
                   transition-all duration-200 bg-white font-medium
                   hover:border-neutral-300;
        }

        .input-field:disabled {
            @apply bg-neutral-50 cursor-not-allowed border-neutral-100;
        }

        /* Sidebar navigation con efectos modernos */
        .nav-item {
            @apply flex items-center px-4 py-3.5 text-neutral-400
                   hover:bg-white/10 hover:text-white
                   transition-all duration-200 rounded-xl mx-2 my-0.5
                   font-medium relative overflow-hidden;
        }

        .nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(to bottom, #14B8A6, #EC4899);
            transform: scaleY(0);
            transition: transform 0.3s ease;
        }

        .nav-item:hover::before {
            transform: scaleY(1);
        }

        .nav-item.active {
            @apply bg-gradient-to-r from-primary-500/90 to-accent-500/90 text-white shadow-md;
        }

        .nav-item.active::before {
            transform: scaleY(1);
        }

        /* Badges modernos */
        .badge {
            @apply inline-flex items-center px-3 py-1.5 rounded-full text-xs font-bold
                   border border-transparent;
        }

        .badge-success {
            @apply bg-success-100 text-success-700 border-success-200;
        }

        .badge-danger {
            @apply bg-danger-100 text-danger-700 border-danger-200;
        }

        .badge-warning {
            @apply bg-warning-100 text-warning-700 border-warning-200;
        }

        .badge-primary {
            @apply bg-primary-100 text-primary-700 border-primary-200;
        }

        .badge-accent {
            @apply bg-accent-100 text-accent-700 border-accent-200;
        }

        /* Alertas con mejor jerarquía visual */
        .alert {
            @apply rounded-xl p-4 border-l-4 shadow-sm;
        }

        .alert-success {
            @apply bg-success-50 border-success-500 text-success-900;
        }

        .alert-danger {
            @apply bg-danger-50 border-danger-500 text-danger-900;
        }

        .alert-warning {
            @apply bg-warning-50 border-warning-500 text-warning-900;
        }

        .alert-info {
            @apply bg-primary-50 border-primary-500 text-primary-900;
        }

        /* Tablas modernas */
        table {
            @apply w-full;
        }

        thead {
            @apply bg-gradient-to-r from-neutral-50 to-neutral-100 border-b-2 border-neutral-200;
        }

        th {
            @apply px-6 py-4 text-left text-xs font-bold text-neutral-700 uppercase tracking-wider;
        }

        td {
            @apply px-6 py-4 text-sm text-neutral-800 font-medium;
        }

        tbody tr {
            @apply border-b border-neutral-100 hover:bg-primary-50/50 transition-colors duration-150;
        }

        /* Scrollbar personalizada moderna */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #F1F5F9;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, #14B8A6, #0D9488);
            border-radius: 10px;
            border: 2px solid #F1F5F9;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(to bottom, #0D9488, #0F766E);
        }

        /* Loading spinner */
        .spinner {
            @apply inline-block w-6 h-6 border-4 border-neutral-200 border-t-primary-500
                   rounded-full animate-spin;
        }

        /* Dividers elegantes */
        .divider {
            @apply border-t border-neutral-200 my-6;
        }

        .divider-gradient {
            @apply h-px bg-gradient-to-r from-transparent via-primary-300 to-transparent my-6;
        }
    </style>
</head>
<body class="bg-neutral-50 antialiased">

            <!-- Logo y título -->
            <div class="relative p-8 border-b border-white/10">
                <div class="flex items-center space-x-4">

            <!-- Navegación principal -->

                        </div>

                <div class="mt-8 mb-4 px-6">

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto bg-neutral-50">

    {% block scripts %}{% endblock %}

    <script>
        // Marcar el item activo en la navegación
        document.addEventListener('DOMContentLoaded', function() {
            const currentPath = window.location.pathname;
            const navLinks = document.querySelectorAll('.nav-item');

            navLinks.forEach(link => {
                const href = link.getAttribute('href');
                if (href === currentPath || (currentPath === '/' && href === '/')) {
                    link.classList.add('active');
                }
            });
        });
    </script>
</body>
</html>
