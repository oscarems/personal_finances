<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Personal Finances{% endblock %}</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Custom styles -->
    <style>
        .sidebar-link.active {
            @apply bg-blue-600 text-white;
        }
        .budget-bar {
            transition: width 0.3s ease;
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-900 text-white flex-shrink-0">
            <div class="p-6">
                <h1 class="text-2xl font-bold">💰 Finanzas</h1>
                <p class="text-gray-400 text-sm mt-1">Tu dinero, tu control</p>
            </div>

            <nav class="mt-6">
                <a href="/" class="sidebar-link flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition">
                    <span class="mr-3">📊</span>
                    Dashboard
                </a>
                <a href="/budget" class="sidebar-link flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition">
                    <span class="mr-3">💵</span>
                    Presupuesto
                </a>
                <a href="/transactions" class="sidebar-link flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition">
                    <span class="mr-3">📝</span>
                    Transacciones
                </a>
                <a href="/accounts" class="sidebar-link flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition">
                    <span class="mr-3">🏦</span>
                    Cuentas
                </a>
                <a href="/import" class="sidebar-link flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition">
                    <span class="mr-3">📥</span>
                    Importar YNAB
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto">
            <div class="p-8">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script>
        // Highlight active link
        document.addEventListener('DOMContentLoaded', function() {
            const currentPath = window.location.pathname;
            document.querySelectorAll('.sidebar-link').forEach(link => {
                if (link.getAttribute('href') === currentPath) {
                    link.classList.add('active');
                }
            });
        });
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
