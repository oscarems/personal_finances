<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Personal Finances{% endblock %}</title>
    
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        .budget-bar {
            transition: width 0.3s ease;
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-900 text-white">
            <div class="p-6">
                <h1 class="text-2xl font-bold">💰 Finanzas</h1>
                <p class="text-gray-400 text-sm mt-1">Personal</p>
            </div>
            
            <nav class="mt-6">
                <a href="/" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition">
                    <span class="mr-3">📊</span>
                    Dashboard
                </a>
                <a href="/budget" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition">
                    <span class="mr-3">💰</span>
                    Presupuesto
                </a>
                <a href="/transactions" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition">
                    <span class="mr-3">📝</span>
                    Transacciones
                </a>
                <a href="/recurring" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition">
                    <span class="mr-3">🔄</span>
                    Transacciones Automáticas
                </a>
                <a href="/accounts" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition">
                    <span class="mr-3">🏦</span>
                    Cuentas
                </a>
                <a href="/debts" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition">
                    <span class="mr-3">💳</span>
                    Deudas
                </a>
                <a href="/emergency-fund" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition">
                    <span class="mr-3">🆘</span>
                    Fondo de Emergencia
                </a>
                <a href="/reports" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition">
                    <span class="mr-3">📈</span>
                    Reportes
                </a>
                <a href="/mortgage" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition">
                    <span class="mr-3">🏠</span>
                    Simulador Hipoteca
                </a>
                <a href="/import" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition">
                    <span class="mr-3">📥</span>
                    Importar YNAB
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto">
            <div class="container mx-auto px-8 py-8">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
