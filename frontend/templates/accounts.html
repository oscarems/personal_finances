{% extends "base.html" %}

{% block title %}Cuentas - Personal Finances{% endblock %}

{% block content %}
<div class="mb-8">
    <div class="flex justify-between items-center">
        <div>
            <h2 class="text-3xl font-bold text-gray-800">Cuentas</h2>
            <p class="text-gray-600 mt-2">Gestiona tus cuentas bancarias</p>
        </div>
        <button onclick="openAddModal()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">
            + Nueva Cuenta
        </button>
    </div>
</div>

<!-- Accounts Grid -->
<div id="accountsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <!-- Accounts will be loaded here -->
</div>

<!-- Add Account Modal -->
<div id="addModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-lg p-8 max-w-md w-full">
        <h3 class="text-xl font-bold mb-4">Nueva Cuenta</h3>
        <form id="addAccountForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Nombre</label>
                <input type="text" id="newName" required class="w-full px-4 py-2 border border-gray-300 rounded-lg">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Tipo</label>
                <select id="newType" required class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                    <option value="checking">Cuenta Corriente</option>
                    <option value="savings">Ahorros</option>
                    <option value="credit_card">Tarjeta de Crédito</option>
                    <option value="cash">Efectivo</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Moneda</label>
                <select id="newCurrency" required class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                    <option value="1">COP</option>
                    <option value="2">USD</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Saldo Inicial</label>
                <input type="number" id="newBalance" step="0.01" class="w-full px-4 py-2 border border-gray-300 rounded-lg" value="0">
            </div>
            <div class="flex justify-end space-x-3 pt-4">
                <button type="button" onclick="closeAddModal()" class="px-4 py-2 text-gray-700 hover:bg-gray-100 rounded-lg">
                    Cancelar
                </button>
                <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                    Crear
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        loadAccounts();

        document.getElementById('addAccountForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            await addAccount();
        });
    });

    async function loadAccounts() {
        const res = await fetch('/api/accounts/');
        const accounts = await res.json();
        displayAccounts(accounts);
    }

    function displayAccounts(accounts) {
        const grid = document.getElementById('accountsGrid');

        if (accounts.length === 0) {
            grid.innerHTML = '<p class="text-gray-500 col-span-3 text-center">No hay cuentas</p>';
            return;
        }

        grid.innerHTML = accounts.map(acc => {
            const typeIcons = {
                'checking': '🏦',
                'savings': '💰',
                'credit_card': '💳',
                'cash': '💵'
            };

            const typeNames = {
                'checking': 'Cuenta Corriente',
                'savings': 'Ahorros',
                'credit_card': 'Tarjeta de Crédito',
                'cash': 'Efectivo'
            };

            const isPositive = acc.balance >= 0;
            const symbol = acc.currency.symbol || '$';

            return `
                <div class="bg-white rounded-lg shadow p-6">
                    <div class="flex items-start justify-between mb-4">
                        <div>
                            <p class="text-gray-500 text-sm">${typeNames[acc.type] || acc.type}</p>
                            <h3 class="text-xl font-semibold text-gray-800 mt-1">${acc.name}</h3>
                        </div>
                        <div class="text-3xl">${typeIcons[acc.type] || '🏦'}</div>
                    </div>
                    <div class="border-t border-gray-200 pt-4">
                        <p class="text-sm text-gray-500">Saldo en ${acc.currency.code}</p>
                        <p class="text-2xl font-bold ${isPositive ? 'text-green-600' : 'text-red-600'} mt-1">
                            ${symbol}${Math.abs(acc.balance).toLocaleString('es-CO', {minimumFractionDigits: acc.currency.decimals})}
                        </p>
                    </div>
                </div>
            `;
        }).join('');
    }

    function openAddModal() {
        document.getElementById('addModal').classList.remove('hidden');
    }

    function closeAddModal() {
        document.getElementById('addModal').classList.add('hidden');
        document.getElementById('addAccountForm').reset();
    }

    async function addAccount() {
        const data = {
            name: document.getElementById('newName').value,
            type: document.getElementById('newType').value,
            currency_id: parseInt(document.getElementById('newCurrency').value),
            balance: parseFloat(document.getElementById('newBalance').value)
        };

        try {
            const res = await fetch('/api/accounts/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                closeAddModal();
                loadAccounts();
            } else {
                alert('Error al crear cuenta');
            }
        } catch (error) {
            console.error('Error:', error);
            alert('Error al crear cuenta');
        }
    }
</script>
{% endblock %}
