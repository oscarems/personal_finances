{% extends "base.html" %}

{% block title %}Cuentas - Personal Finances{% endblock %}

{% block content %}
<div class="mb-8">
    <div class="page-header">
        <div>
            <h2 class="page-title">Cuentas</h2>
            <p class="page-subtitle mt-2">Gestiona tus cuentas bancarias y tarjetas</p>
        </div>
        <button onclick="openCreateModal()" class="btn-primary">
            + Nueva cuenta
        </button>
    </div>
</div>

<!-- Accounts Grid -->
<div id="accountsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
    <!-- Accounts will be loaded here -->
</div>

<!-- Create/Edit Modal - Diseño Ultra Moderno -->
<div id="accountModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 backdrop-blur-md">
    <div class="bg-white card p-8 max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto shadow-2xl border-2 border-neutral-300">
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center space-x-3">
                <div class="relative">
                    <div class="absolute inset-0 bg-secondary-500 rounded-xl blur-md opacity-30"></div>
                    <div class="relative bg-gradient-to-br from-secondary-400 to-secondary-600 p-3 rounded-xl">
                        <span class="text-2xl">🏦</span>
                    </div>
                </div>
                <h3 id="modalTitle" class="text-3xl font-extrabold text-neutral-900">Nueva Cuenta</h3>
            </div>
            <button onclick="closeAccountModal()" class="text-neutral-400 hover:text-neutral-600 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>

        <form id="accountForm" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-neutral-700 mb-2 uppercase tracking-wide">Nombre de la Cuenta</label>
                <input type="text" id="accountName" required
                       class="input-field"
                       placeholder="Ej: Davivienda Corriente">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-neutral-700 mb-2 uppercase tracking-wide">Tipo</label>
                    <select id="accountType" required class="input-field">
                        <option value="checking">💳 Cuenta Corriente</option>
                        <option value="savings">🏦 Cuenta de Ahorros</option>
                        <option value="credit_card">💳 Tarjeta de Crédito</option>
                        <option value="credit_loan">💰 Crédito Libre Inversión</option>
                        <option value="mortgage">🏠 Hipoteca</option>
                        <option value="cdt">📜 CDT</option>
                        <option value="investment">📈 Inversión</option>
                        <option value="cash">💵 Efectivo</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-bold text-neutral-700 mb-2 uppercase tracking-wide">Moneda</label>
                    <select id="accountCurrency" required class="input-field">
                        <option value="1">🇨🇴 COP</option>
                        <option value="2">🇺🇸 USD</option>
                    </select>
                </div>
            </div>

            <div id="balanceField">
                <label class="block text-sm font-bold text-neutral-700 mb-2 uppercase tracking-wide">Saldo Inicial</label>
                <input type="number" id="accountBalance" step="0.01" value="0"
                       class="input-field text-xl">
            </div>

            <!-- Optional fields based on account type -->
            <div id="interestRateField" class="hidden">
                <label class="block text-sm font-bold text-neutral-700 mb-2 uppercase tracking-wide">Tasa de Interés Anual (%)</label>
                <input type="number" id="accountInterestRate" step="0.01"
                       class="input-field"
                       placeholder="Ej: 5.5">
            </div>

            <div id="creditLimitField" class="hidden">
                <label class="block text-sm font-bold text-neutral-700 mb-2 uppercase tracking-wide">Cupo de Crédito</label>
                <input type="number" id="accountCreditLimit" step="0.01"
                       class="input-field text-xl"
                       placeholder="Ej: 10000000">
            </div>

            <div id="monthlyPaymentField" class="hidden">
                <label class="block text-sm font-bold text-neutral-700 mb-2 uppercase tracking-wide">Cuota Mensual</label>
                <input type="number" id="accountMonthlyPayment" step="0.01"
                       class="input-field text-xl"
                       placeholder="Ej: 500000">
            </div>

            <div id="originalAmountField" class="hidden">
                <label class="block text-sm font-bold text-neutral-700 mb-2 uppercase tracking-wide">Monto Original del Crédito</label>
                <input type="number" id="accountOriginalAmount" step="0.01"
                       class="input-field text-xl"
                       placeholder="Ej: 50000000">
            </div>

            <div id="loanYearsField" class="hidden">
                <label class="block text-sm font-bold text-neutral-700 mb-2 uppercase tracking-wide">Plazo (años)</label>
                <input type="number" id="accountLoanYears" min="1"
                       class="input-field"
                       placeholder="Ej: 20">
            </div>

            <div id="loanStartDateField" class="hidden">
                <label class="block text-sm font-bold text-neutral-700 mb-2 uppercase tracking-wide">Fecha de Inicio</label>
                <input type="date" id="accountLoanStartDate" class="input-field">
            </div>

            <div id="paymentDueDayField" class="hidden">
                <label class="block text-sm font-bold text-neutral-700 mb-2 uppercase tracking-wide">Día de Pago (1-31)</label>
                <input type="number" id="accountPaymentDueDay" min="1" max="31"
                       class="input-field"
                       placeholder="Ej: 15">
            </div>

            <div id="maturityDateField" class="hidden">
                <label class="block text-sm font-bold text-neutral-700 mb-2 uppercase tracking-wide">Fecha de Vencimiento</label>
                <input type="date" id="accountMaturityDate" class="input-field">
            </div>

            <div>
                <label class="block text-sm font-bold text-neutral-700 mb-2 uppercase tracking-wide">Notas (opcional)</label>
                <textarea id="accountNotes" rows="3"
                          class="input-field resize-none"
                          placeholder="Número de cuenta, etc."></textarea>
            </div>

            <div class="flex items-center p-4 bg-neutral-50 rounded-xl border-2 border-neutral-200">
                <input type="checkbox" id="accountIsBudget" checked
                       class="w-5 h-5 text-primary-600 border-neutral-300 rounded focus:ring-primary-500">
                <label for="accountIsBudget" class="ml-3 text-sm font-semibold text-neutral-700">
                    ✓ Incluir en presupuesto
                </label>
            </div>

            <div class="flex justify-end space-x-3 pt-6 border-t-2 border-neutral-100">
                <button type="button" onclick="closeAccountModal()" class="btn-secondary">
                    Cancelar
                </button>
                <button type="submit" class="btn-primary">
                    💾 Guardar
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Balance Adjustment Modal -->
<div id="adjustmentModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 backdrop-blur-md">
    <div class="bg-white card p-8 max-w-xl w-full mx-4 shadow-2xl border-2 border-neutral-300">
        <div class="flex items-center justify-between mb-6">
            <div class="flex items-center space-x-3">
                <div class="relative">
                    <div class="absolute inset-0 bg-primary-500 rounded-xl blur-md opacity-30"></div>
                    <div class="relative bg-gradient-to-br from-primary-400 to-primary-600 p-3 rounded-xl">
                        <span class="text-2xl">🧮</span>
                    </div>
                </div>
                <h3 class="text-2xl font-extrabold text-neutral-900">Ajustar saldo</h3>
            </div>
            <button onclick="closeAdjustmentModal()" class="text-neutral-400 hover:text-neutral-600 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>

        <div class="mb-4 p-4 bg-neutral-50 rounded-xl border border-neutral-200">
            <p class="text-sm text-neutral-500">Saldo actual en la app</p>
            <p id="adjustmentCurrentBalance" class="text-xl font-bold text-neutral-900"></p>
            <p id="adjustmentAccountName" class="text-sm text-neutral-500 mt-1"></p>
        </div>

        <form id="adjustmentForm" class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-neutral-700 mb-2 uppercase tracking-wide">Saldo real (banco)</label>
                <input type="number" id="adjustmentActualBalance" step="0.01" required
                       class="input-field text-xl"
                       placeholder="Ingresa el saldo real">
            </div>

            <div>
                <label class="block text-sm font-bold text-neutral-700 mb-2 uppercase tracking-wide">Fecha</label>
                <input type="date" id="adjustmentDate" required class="input-field">
            </div>

            <div>
                <label class="block text-sm font-bold text-neutral-700 mb-2 uppercase tracking-wide">Nota (opcional)</label>
                <input type="text" id="adjustmentMemo" class="input-field"
                       placeholder="Ej: Ajuste por conciliación bancaria">
            </div>

            <div class="p-4 rounded-xl border border-neutral-200 bg-white">
                <p class="text-sm text-neutral-500">Diferencia a registrar</p>
                <p id="adjustmentDifference" class="text-lg font-semibold text-neutral-900"></p>
                <p id="adjustmentImpact" class="text-sm text-neutral-500 mt-1"></p>
            </div>

            <div class="flex justify-end space-x-3 pt-4 border-t-2 border-neutral-100">
                <button type="button" onclick="closeAdjustmentModal()" class="btn-secondary">
                    Cancelar
                </button>
                <button type="submit" class="btn-primary">
                    ✅ Registrar ajuste
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let accounts = [];
    let editingAccountId = null;
    let adjustingAccountId = null;

    // Exchange rates (will be loaded from API)
    let EXCHANGE_RATE_USD_TO_COP = 4000;  // Default, will be updated

    document.addEventListener('DOMContentLoaded', async function() {
        await loadExchangeRate();
        await loadAccounts();

        // Add event listener for account type change
        document.getElementById('accountType').addEventListener('change', updateOptionalFields);
    });

    async function loadExchangeRate() {
        try {
            const res = await fetch('/api/exchange-rates/current');
            const data = await res.json();
            EXCHANGE_RATE_USD_TO_COP = data.rate;
            console.log(`✓ Exchange rate loaded: 1 USD = ${EXCHANGE_RATE_USD_TO_COP} COP`);
        } catch (error) {
            console.error('Error loading exchange rate:', error);
            // Keep default rate
        }
    }

    async function loadAccounts() {
        try {
            const res = await fetch('/api/accounts/');
            accounts = await res.json();
            displayAccounts();
        } catch (error) {
            console.error('Error loading accounts:', error);
        }
    }

    function convertBalance(amount, fromCurrency, toCurrency) {
        if (fromCurrency === toCurrency) return amount;

        // Convert using real exchange rate
        if (fromCurrency === 'USD' && toCurrency === 'COP') {
            return amount * EXCHANGE_RATE_USD_TO_COP;
        } else if (fromCurrency === 'COP' && toCurrency === 'USD') {
            return amount / EXCHANGE_RATE_USD_TO_COP;
        }

        return amount;
    }

    function getConvertedBalance(acc) {
        // Show converted balance in the other currency
        const otherCurrency = acc.currency.code === 'COP' ? 'USD' : 'COP';
        const otherSymbol = otherCurrency === 'COP' ? '$' : 'US$';
        const otherDecimals = otherCurrency === 'COP' ? 0 : 2;

        const convertedAmount = convertBalance(acc.balance, acc.currency.code, otherCurrency);
        const isDebtAccount = ['credit_card', 'credit_loan', 'mortgage'].includes(acc.type);
        const isPositive = convertedAmount >= 0;
        const balanceClass = isDebtAccount ? 'text-red-600' : (isPositive ? 'text-green-600' : 'text-red-600');

        return `
            <div class="mt-2 pt-2 border-t border-gray-100">
                <p class="text-xs text-gray-500">Equivalente en ${otherCurrency}</p>
                <p class="text-sm font-semibold ${balanceClass}">
                    ${otherSymbol}${Math.abs(convertedAmount).toLocaleString('en-US', {
                        minimumFractionDigits: otherDecimals,
                        maximumFractionDigits: otherDecimals
                    })}
                </p>
            </div>
        `;
    }

    function displayAccounts() {
        const grid = document.getElementById('accountsGrid');

        if (accounts.length === 0) {
            grid.innerHTML = `
                <div class="col-span-full text-center py-12">
                    <p class="text-gray-500 text-lg">No tienes cuentas aún</p>
                    <button onclick="openCreateModal()"
                            class="mt-4 text-blue-600 hover:text-blue-700 font-semibold">
                        + Crear tu primera cuenta
                    </button>
                </div>
            `;
            return;
        }

        grid.innerHTML = accounts.map(acc => {
            const typeIcons = {
                'checking': '💳',
                'savings': '🏦',
                'credit_card': '💳',
                'credit_loan': '💰',
                'mortgage': '🏠',
                'cdt': '📜',
                'investment': '📈',
                'cash': '💵'
            };

            const typeNames = {
                'checking': 'Corriente',
                'savings': 'Ahorros',
                'credit_card': 'Tarjeta Crédito',
                'credit_loan': 'Crédito',
                'mortgage': 'Hipoteca',
                'cdt': 'CDT',
                'investment': 'Inversión',
                'cash': 'Efectivo'
            };

            const isDebtAccount = ['credit_card', 'credit_loan', 'mortgage'].includes(acc.type);
            const isPositive = acc.balance >= 0;
            const balanceClass = isDebtAccount ? 'text-red-600' : (isPositive ? 'text-green-600' : 'text-red-600');

            return `
                <div class="card-md p-6 hover:shadow-strong transition">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <div class="text-3xl mb-2">${typeIcons[acc.type] || '🏦'}</div>
                            <h3 class="font-bold text-lg text-gray-800">${acc.name}</h3>
                            <p class="text-sm text-gray-500">${typeNames[acc.type]}</p>
                        </div>
                        <div class="text-right">
                            <button onclick="editAccount(${acc.id})"
                                    class="text-blue-600 hover:text-blue-700 text-sm">
                                Editar
                            </button>
                            <button onclick="openAdjustmentModal(${acc.id})"
                                    class="ml-3 text-sm text-emerald-600 hover:text-emerald-700">
                                Ajustar saldo
                            </button>
                        </div>
                    </div>

                    <div class="border-t pt-4">
                        <p class="text-sm text-gray-600 mb-1">Saldo</p>
                        <p class="text-2xl font-bold ${balanceClass}">
                            ${acc.currency.symbol}${Math.abs(acc.balance).toLocaleString('en-US', {
                                minimumFractionDigits: acc.currency.decimals
                            })}
                        </p>
                        <p class="text-xs text-gray-500 mt-1">${acc.currency.code}</p>

                        ${getConvertedBalance(acc)}
                    </div>

                    ${acc.notes ? `
                        <div class="mt-4 text-sm text-gray-600">
                            <p class="italic">${acc.notes}</p>
                        </div>
                    ` : ''}

                    <div class="mt-4 flex gap-2">
                        <button onclick="viewTransactions(${acc.id})"
                                class="flex-1 text-sm bg-gray-100 hover:bg-gray-200 py-2 rounded">
                            Ver Transacciones
                        </button>
                        <button onclick="deleteAccount(${acc.id})"
                                class="text-sm text-red-600 hover:bg-red-50 px-3 py-2 rounded">
                            🗑️
                        </button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function updateOptionalFields() {
        const accountType = document.getElementById('accountType').value;

        // Hide all optional fields first
        document.getElementById('interestRateField').classList.add('hidden');
        document.getElementById('creditLimitField').classList.add('hidden');
        document.getElementById('monthlyPaymentField').classList.add('hidden');
        document.getElementById('originalAmountField').classList.add('hidden');
        document.getElementById('loanYearsField').classList.add('hidden');
        document.getElementById('loanStartDateField').classList.add('hidden');
        document.getElementById('paymentDueDayField').classList.add('hidden');
        document.getElementById('maturityDateField').classList.add('hidden');

        // Show fields based on account type
        switch(accountType) {
            case 'savings':
                document.getElementById('interestRateField').classList.remove('hidden');
                break;
            case 'credit_card':
                document.getElementById('creditLimitField').classList.remove('hidden');
                document.getElementById('paymentDueDayField').classList.remove('hidden');
                break;
            case 'credit_loan':
                document.getElementById('interestRateField').classList.remove('hidden');
                document.getElementById('monthlyPaymentField').classList.remove('hidden');
                document.getElementById('originalAmountField').classList.remove('hidden');
                document.getElementById('loanYearsField').classList.remove('hidden');
                document.getElementById('loanStartDateField').classList.remove('hidden');
                break;
            case 'mortgage':
                document.getElementById('interestRateField').classList.remove('hidden');
                document.getElementById('monthlyPaymentField').classList.remove('hidden');
                document.getElementById('originalAmountField').classList.remove('hidden');
                document.getElementById('loanYearsField').classList.remove('hidden');
                document.getElementById('loanStartDateField').classList.remove('hidden');
                break;
            case 'cdt':
                document.getElementById('interestRateField').classList.remove('hidden');
                document.getElementById('originalAmountField').classList.remove('hidden');
                document.getElementById('maturityDateField').classList.remove('hidden');
                break;
        }
    }

    function openCreateModal() {
        editingAccountId = null;
        document.getElementById('modalTitle').textContent = 'Nueva Cuenta';
        document.getElementById('accountForm').reset();
        document.getElementById('accountModal').classList.remove('hidden');
        document.getElementById('balanceField').classList.remove('hidden');
        document.getElementById('accountCurrency').disabled = false;
        updateOptionalFields();
    }

    function closeAccountModal() {
        document.getElementById('accountModal').classList.add('hidden');
        editingAccountId = null;
    }

    function openAdjustmentModal(accountId) {
        const account = accounts.find(a => a.id === accountId);
        if (!account) return;

        adjustingAccountId = accountId;
        const symbol = account.currency.symbol || '$';
        const decimals = account.currency.decimals ?? 0;
        const formattedBalance = `${symbol}${Math.abs(account.balance).toLocaleString('en-US', {
            minimumFractionDigits: decimals,
            maximumFractionDigits: decimals
        })}`;

        document.getElementById('adjustmentCurrentBalance').textContent = formattedBalance;
        document.getElementById('adjustmentAccountName').textContent = `${account.name} · ${account.currency.code}`;
        document.getElementById('adjustmentActualBalance').value = '';
        document.getElementById('adjustmentMemo').value = '';
        document.getElementById('adjustmentDate').value = new Date().toISOString().slice(0, 10);

        updateAdjustmentPreview();
        document.getElementById('adjustmentModal').classList.remove('hidden');
    }

    function closeAdjustmentModal() {
        document.getElementById('adjustmentModal').classList.add('hidden');
        adjustingAccountId = null;
    }

    function updateAdjustmentPreview() {
        const account = accounts.find(a => a.id === adjustingAccountId);
        if (!account) return;

        const actualValue = parseFloat(document.getElementById('adjustmentActualBalance').value);
        const difference = Number.isFinite(actualValue) ? actualValue - account.balance : 0;
        const symbol = account.currency.symbol || '$';
        const decimals = account.currency.decimals ?? 0;
        const formattedDiff = `${symbol}${Math.abs(difference).toLocaleString('en-US', {
            minimumFractionDigits: decimals,
            maximumFractionDigits: decimals
        })}`;

        const differenceEl = document.getElementById('adjustmentDifference');
        differenceEl.textContent = difference === 0 ? `${symbol}0` : formattedDiff;
        differenceEl.className = `text-lg font-semibold ${difference >= 0 ? 'text-green-600' : 'text-red-600'}`;

        const impactEl = document.getElementById('adjustmentImpact');
        if (!Number.isFinite(actualValue)) {
            impactEl.textContent = 'Ingresa el saldo real para calcular el ajuste.';
        } else if (difference === 0) {
            impactEl.textContent = 'No hay diferencia. No se registrará ningún movimiento.';
        } else if (difference > 0) {
            impactEl.textContent = `Se registrará una entrada de ${formattedDiff}.`;
        } else {
            impactEl.textContent = `Se registrará una salida de ${formattedDiff}.`;
        }
    }

    async function editAccount(accountId) {
        const account = accounts.find(a => a.id === accountId);
        if (!account) return;

        editingAccountId = accountId;
        document.getElementById('modalTitle').textContent = 'Editar Cuenta';
        document.getElementById('accountName').value = account.name;
        document.getElementById('accountType').value = account.type;
        document.getElementById('accountCurrency').value = account.currency.id;
        document.getElementById('accountBalance').value = account.balance;
        document.getElementById('accountNotes').value = account.notes || '';
        document.getElementById('accountIsBudget').checked = account.is_budget;

        // Populate optional fields
        document.getElementById('accountInterestRate').value = account.interest_rate || '';
        document.getElementById('accountCreditLimit').value = account.credit_limit || '';
        document.getElementById('accountMonthlyPayment').value = account.monthly_payment || '';
        document.getElementById('accountOriginalAmount').value = account.original_amount || '';
        document.getElementById('accountLoanYears').value = account.loan_years || '';
        document.getElementById('accountLoanStartDate').value = account.loan_start_date || '';
        document.getElementById('accountPaymentDueDay').value = account.payment_due_day || '';
        document.getElementById('accountMaturityDate').value = account.maturity_date || '';

        // Update field visibility based on type
        updateOptionalFields();

        // Hide currency when editing
        document.getElementById('balanceField').classList.toggle(
            'hidden',
            !['credit_card', 'credit_loan', 'mortgage'].includes(account.type)
        );
        document.getElementById('accountCurrency').disabled = true;

        document.getElementById('accountModal').classList.remove('hidden');
    }

    document.getElementById('accountForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const data = {
            name: document.getElementById('accountName').value,
            type: document.getElementById('accountType').value,
            currency_id: parseInt(document.getElementById('accountCurrency').value),
            balance: parseFloat(document.getElementById('accountBalance').value),
            is_budget: document.getElementById('accountIsBudget').checked,
            notes: document.getElementById('accountNotes').value || null
        };

        // Add optional fields if they have values
        const interestRate = document.getElementById('accountInterestRate').value;
        if (interestRate) data.interest_rate = parseFloat(interestRate);

        const creditLimit = document.getElementById('accountCreditLimit').value;
        if (creditLimit) data.credit_limit = parseFloat(creditLimit);

        const monthlyPayment = document.getElementById('accountMonthlyPayment').value;
        if (monthlyPayment) data.monthly_payment = parseFloat(monthlyPayment);

        const originalAmount = document.getElementById('accountOriginalAmount').value;
        if (originalAmount) data.original_amount = parseFloat(originalAmount);

        const loanYears = document.getElementById('accountLoanYears').value;
        if (loanYears) data.loan_years = parseInt(loanYears);

        const loanStartDate = document.getElementById('accountLoanStartDate').value;
        if (loanStartDate) data.loan_start_date = loanStartDate;

        const paymentDueDay = document.getElementById('accountPaymentDueDay').value;
        if (paymentDueDay) data.payment_due_day = parseInt(paymentDueDay);

        const maturityDate = document.getElementById('accountMaturityDate').value;
        if (maturityDate) data.maturity_date = maturityDate;

        try {
            let res;
            if (editingAccountId) {
                // Update - include optional fields
                const updateData = {
                    name: data.name,
                    type: data.type,
                    notes: data.notes,
                    is_budget: data.is_budget
                };

                // Add optional fields to update
                if (data.interest_rate !== undefined) updateData.interest_rate = data.interest_rate;
                if (data.credit_limit !== undefined) updateData.credit_limit = data.credit_limit;
                if (data.monthly_payment !== undefined) updateData.monthly_payment = data.monthly_payment;
                if (data.original_amount !== undefined) updateData.original_amount = data.original_amount;
                if (data.loan_years !== undefined) updateData.loan_years = data.loan_years;
                if (data.loan_start_date !== undefined) updateData.loan_start_date = data.loan_start_date;
                if (data.payment_due_day !== undefined) updateData.payment_due_day = data.payment_due_day;
                if (data.maturity_date !== undefined) updateData.maturity_date = data.maturity_date;
                if (['credit_card', 'credit_loan', 'mortgage'].includes(data.type)) {
                    updateData.balance = data.balance;
                }

                res = await fetch(`/api/accounts/${editingAccountId}`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(updateData)
                });
            } else {
                // Create
                res = await fetch('/api/accounts/', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
            }

            if (res.ok) {
                closeAccountModal();
                await loadAccounts();
            } else {
                const error = await res.json();
                alert('Error: ' + (error.detail || 'Error desconocido'));
            }
        } catch (error) {
            console.error('Error:', error);
            alert('Error al guardar la cuenta');
        }
    });

    document.getElementById('adjustmentActualBalance').addEventListener('input', updateAdjustmentPreview);

    document.getElementById('adjustmentForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const account = accounts.find(a => a.id === adjustingAccountId);
        if (!account) return;

        const actualBalance = parseFloat(document.getElementById('adjustmentActualBalance').value);
        if (!Number.isFinite(actualBalance)) {
            alert('Ingresa un saldo real válido.');
            return;
        }

        const difference = actualBalance - account.balance;
        if (difference === 0) {
            alert('No hay diferencia para ajustar.');
            return;
        }

        const data = {
            account_id: adjustingAccountId,
            date: document.getElementById('adjustmentDate').value,
            actual_balance: actualBalance,
            memo: document.getElementById('adjustmentMemo').value || null
        };

        try {
            const res = await fetch('/api/transactions/adjustment', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            if (res.ok) {
                closeAdjustmentModal();
                await loadAccounts();
            } else {
                const error = await res.json();
                alert('Error: ' + (error.detail || 'No se pudo ajustar el saldo'));
            }
        } catch (error) {
            console.error('Error:', error);
            alert('Error al ajustar el saldo');
        }
    });

    async function deleteAccount(accountId) {
        if (!confirm('¿Seguro que quieres cerrar esta cuenta?')) return;

        try {
            const res = await fetch(`/api/accounts/${accountId}`, {
                method: 'DELETE'
            });

            if (res.ok) {
                await loadAccounts();
            } else {
                alert('Error al cerrar la cuenta');
            }
        } catch (error) {
            console.error('Error:', error);
            alert('Error al cerrar la cuenta');
        }
    }

    function viewTransactions(accountId) {
        window.location.href = `/transactions?account_id=${accountId}`;
    }
</script>
{% endblock %}
