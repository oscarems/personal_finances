{% extends "base.html" %}

{% block title %}Deudas - Personal Finances{% endblock %}

{% block content %}
<div class="mb-8 flex justify-between items-center">
    <div>
        <h2 class="text-3xl font-bold text-gray-800">Gestión de Deudas</h2>
        <p class="text-gray-600 mt-2">Administra tus tarjetas de crédito, préstamos e hipotecas</p>
    </div>
    <button onclick="openNewDebtModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg flex items-center">
        <span class="mr-2">+</span> Nueva Deuda
    </button>
</div>

<!-- Summary Cards -->
<div id="summaryCards" class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
    <!-- Cards will be loaded here -->
</div>

<!-- Debts List -->
<div class="bg-white rounded-lg shadow">
    <div class="p-6 border-b border-gray-200 flex justify-between items-center">
        <h3 class="text-lg font-semibold text-gray-800">Tus Deudas</h3>
        <div class="flex space-x-2">
            <button onclick="filterDebts('all')" class="filter-btn active px-4 py-2 rounded text-sm" data-filter="all">Todas</button>
            <button onclick="filterDebts('credit_card')" class="filter-btn px-4 py-2 rounded text-sm" data-filter="credit_card">Tarjetas</button>
            <button onclick="filterDebts('credit_loan')" class="filter-btn px-4 py-2 rounded text-sm" data-filter="credit_loan">Préstamos</button>
            <button onclick="filterDebts('mortgage')" class="filter-btn px-4 py-2 rounded text-sm" data-filter="mortgage">Hipotecas</button>
        </div>
    </div>
    <div id="debtsContainer" class="p-6">
        <!-- Debts will be loaded here -->
    </div>
</div>

<!-- New/Edit Debt Modal -->
<div id="debtModal" class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50 transition-opacity duration-300">
    <div class="relative top-20 mx-auto p-5 border w-full max-w-2xl shadow-lg rounded-md bg-white transform transition-all duration-300">
        <div class="flex justify-between items-center mb-4">
            <h3 id="debtModalTitle" class="text-lg font-semibold">Nueva Deuda</h3>
            <button onclick="closeDebtModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
        </div>
        <form id="debtForm" class="space-y-4">
            <input type="hidden" name="debt_id" id="debt_id">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Nombre</label>
                    <input type="text" name="name" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Tipo</label>
                    <select name="debt_type" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                        <option value="credit_card">Tarjeta de Crédito</option>
                        <option value="credit_loan">Préstamo Personal</option>
                        <option value="mortgage">Hipoteca</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Cuenta</label>
                    <select name="account_id" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                        <!-- Accounts will be loaded here -->
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Moneda</label>
                    <select name="currency_code" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                        <option value="COP">COP</option>
                        <option value="USD">USD</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Monto Original</label>
                    <input type="number" name="original_amount" required step="0.01" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Saldo Actual</label>
                    <input type="number" name="current_balance" required step="0.01" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Tasa de Interés (% anual)</label>
                    <input type="number" name="interest_rate" step="0.01" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Cuota Mensual</label>
                    <input type="number" name="monthly_payment" step="0.01" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Fecha de Inicio</label>
                    <input type="date" name="start_date" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Institución Financiera</label>
                    <input type="text" name="institution" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                </div>
            </div>
            <div class="flex justify-end space-x-3 pt-4">
                <button type="button" onclick="closeDebtModal()" class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50">
                    Cancelar
                </button>
                <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">
                    Guardar
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Debt Details Modal -->
<div id="debtDetailsModal" class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50 transition-opacity duration-300">
    <div class="relative top-10 mx-auto p-5 border w-full max-w-4xl shadow-lg rounded-md bg-white transform transition-all duration-300 mb-10">
        <div class="flex justify-between items-center mb-4 border-b pb-4">
            <div>
                <h3 id="debtDetailsTitle" class="text-2xl font-bold text-gray-800"></h3>
                <p id="debtDetailsSubtitle" class="text-sm text-gray-600 mt-1"></p>
            </div>
            <button onclick="closeDebtDetailsModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
        </div>

        <div id="debtDetailsContent" class="space-y-6">
            <!-- Content will be loaded here -->
        </div>

        <div class="mt-6 flex justify-end space-x-3 border-t pt-4">
            <button onclick="closeDebtDetailsModal()" class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50">
                Cerrar
            </button>
            <button onclick="editDebtFromDetails()" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">
                Editar Deuda
            </button>
        </div>
    </div>
</div>

<style>
    .filter-btn {
        background-color: #f3f4f6;
        color: #4b5563;
    }
    .filter-btn.active {
        background-color: #3b82f6;
        color: white;
    }

    .modal-fade-in {
        animation: fadeIn 0.3s ease-in-out;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(-20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

{% endblock %}

{% block scripts %}
<script>
    let allDebts = [];
    let currentFilter = 'all';

    async function loadDebts() {
        try {
            // Load summary
            const summaryRes = await fetch('/api/debts/summary');
            const summary = await summaryRes.json();
            displaySummary(summary);

            // Load all debts
            const debtsRes = await fetch('/api/debts/');
            allDebts = await debtsRes.json();
            displayDebts(allDebts);

            // Load accounts for form
            const accountsRes = await fetch('/api/accounts/');
            const accounts = await accountsRes.json();
            loadAccountsIntoForm(accounts);

        } catch (error) {
            console.error('Error loading debts:', error);
        }
    }

    function displaySummary(data) {
        const container = document.getElementById('summaryCards');
        let html = '';

        // Total debts
        html += `
            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">Total Deudas</p>
                        <p class="text-2xl font-bold text-gray-800 mt-1">${data.total_debts}</p>
                    </div>
                    <div class="text-4xl">💳</div>
                </div>
            </div>
        `;

        // Total current by currency
        for (const [currency, amount] of Object.entries(data.total_current || {})) {
            html += `
                <div class="bg-white rounded-lg shadow p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">Deuda ${currency}</p>
                            <p class="text-2xl font-bold text-red-600 mt-1">
                                ${currency === 'USD' ? '$' : '$'}${amount.toLocaleString('es-CO', {minimumFractionDigits: currency === 'USD' ? 2 : 0})}
                            </p>
                        </div>
                        <div class="text-4xl">📉</div>
                    </div>
                </div>
            `;
        }

        // Average interest
        if (data.average_interest_rate > 0) {
            html += `
                <div class="bg-white rounded-lg shadow p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">Interés Promedio</p>
                            <p class="text-2xl font-bold text-yellow-600 mt-1">${data.average_interest_rate.toFixed(2)}%</p>
                        </div>
                        <div class="text-4xl">📊</div>
                    </div>
                </div>
            `;
        }

        container.innerHTML = html;
    }

    function displayDebts(debts) {
        const container = document.getElementById('debtsContainer');

        const filteredDebts = currentFilter === 'all'
            ? debts
            : debts.filter(d => d.debt_type === currentFilter);

        if (filteredDebts.length === 0) {
            container.innerHTML = '<p class="text-gray-500 text-center py-8">No hay deudas para mostrar</p>';
            return;
        }

        const html = filteredDebts.map(debt => {
            const typeLabels = {
                'credit_card': '💳 Tarjeta de Crédito',
                'credit_loan': '💰 Préstamo Personal',
                'mortgage': '🏠 Hipoteca'
            };

            const progressPercent = debt.paid_percentage || 0;

            return `
                <div class="border border-gray-200 rounded-lg p-6 mb-4 hover:shadow-md transition">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h4 class="text-lg font-semibold text-gray-800">${debt.name}</h4>
                            <p class="text-sm text-gray-600">${typeLabels[debt.debt_type] || debt.debt_type}</p>
                            ${debt.institution ? `<p class="text-sm text-gray-500">${debt.institution}</p>` : ''}
                        </div>
                        <div class="text-right">
                            <p class="text-2xl font-bold text-red-600">
                                ${debt.currency_code === 'USD' ? '$' : '$'}${debt.current_balance.toLocaleString('es-CO', {minimumFractionDigits: debt.currency_code === 'USD' ? 2 : 0})}
                            </p>
                            <p class="text-sm text-gray-500">de ${debt.currency_code === 'USD' ? '$' : '$'}${debt.original_amount.toLocaleString('es-CO', {minimumFractionDigits: debt.currency_code === 'USD' ? 2 : 0})}</p>
                        </div>
                    </div>

                    <!-- Progress bar -->
                    <div class="mb-4">
                        <div class="flex justify-between text-sm text-gray-600 mb-1">
                            <span>${progressPercent.toFixed(1)}% pagado</span>
                            <span>${(100 - progressPercent).toFixed(1)}% restante</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-2">
                            <div class="bg-green-600 h-2 rounded-full" style="width: ${progressPercent}%"></div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm">
                        ${debt.interest_rate ? `
                            <div>
                                <p class="text-gray-600">Interés</p>
                                <p class="font-semibold">${debt.interest_rate}%</p>
                            </div>
                        ` : ''}
                        ${debt.monthly_payment ? `
                            <div>
                                <p class="text-gray-600">Cuota Mensual</p>
                                <p class="font-semibold">${debt.currency_code === 'USD' ? '$' : '$'}${debt.monthly_payment.toLocaleString('es-CO')}</p>
                            </div>
                        ` : ''}
                        ${debt.credit_limit ? `
                            <div>
                                <p class="text-gray-600">Utilización</p>
                                <p class="font-semibold">${(debt.utilization_percentage || 0).toFixed(1)}%</p>
                            </div>
                        ` : ''}
                        <div>
                            <p class="text-gray-600">Estado</p>
                            <p class="font-semibold ${debt.is_active ? 'text-green-600' : 'text-gray-400'}">
                                ${debt.is_active ? 'Activa' : 'Inactiva'}
                            </p>
                        </div>
                    </div>

                    <div class="mt-4 flex justify-end space-x-2">
                        <button onclick="viewDebtDetails(${debt.id})" class="px-3 py-1 text-blue-600 hover:bg-blue-50 rounded text-sm transition">Ver detalles</button>
                        <button onclick="editDebt(${debt.id})" class="px-3 py-1 text-green-600 hover:bg-green-50 rounded text-sm transition">Editar</button>
                        <button onclick="deleteDebt(${debt.id}, '${debt.name}')" class="px-3 py-1 text-red-600 hover:bg-red-50 rounded text-sm transition">Eliminar</button>
                    </div>
                </div>
            `;
        }).join('');

        container.innerHTML = html;
    }

    function filterDebts(type) {
        currentFilter = type;

        // Update active button
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        document.querySelector(`[data-filter="${type}"]`).classList.add('active');

        displayDebts(allDebts);
    }

    function openNewDebtModal() {
        document.getElementById('debtModalTitle').textContent = 'Nueva Deuda';
        document.getElementById('debt_id').value = '';
        document.getElementById('debtForm').reset();
        document.getElementById('debtModal').classList.remove('hidden');
        // Set default start date to today
        document.querySelector('[name="start_date"]').value = new Date().toISOString().split('T')[0];
    }

    function closeDebtModal() {
        document.getElementById('debtModal').classList.add('hidden');
        document.getElementById('debtForm').reset();
    }

    async function editDebt(id) {
        try {
            const response = await fetch(`/api/debts/${id}`);
            const debt = await response.json();

            document.getElementById('debtModalTitle').textContent = 'Editar Deuda';
            document.getElementById('debt_id').value = debt.id;
            document.querySelector('[name="name"]').value = debt.name;
            document.querySelector('[name="debt_type"]').value = debt.debt_type;
            document.querySelector('[name="account_id"]').value = debt.account_id;
            document.querySelector('[name="currency_code"]').value = debt.currency_code;
            document.querySelector('[name="original_amount"]').value = debt.original_amount;
            document.querySelector('[name="current_balance"]').value = debt.current_balance;
            if (debt.interest_rate) document.querySelector('[name="interest_rate"]').value = debt.interest_rate;
            if (debt.monthly_payment) document.querySelector('[name="monthly_payment"]').value = debt.monthly_payment;
            document.querySelector('[name="start_date"]').value = debt.start_date;
            if (debt.institution) document.querySelector('[name="institution"]').value = debt.institution;

            document.getElementById('debtModal').classList.remove('hidden');
        } catch (error) {
            console.error('Error loading debt:', error);
            alert('Error al cargar la deuda');
        }
    }

    function loadAccountsIntoForm(accounts) {
        const select = document.querySelector('[name="account_id"]');
        select.innerHTML = accounts.map(acc =>
            `<option value="${acc.id}">${acc.name} (${acc.currency.code})</option>`
        ).join('');
    }

    document.getElementById('debtForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());
        const debtId = data.debt_id;
        delete data.debt_id;

        // Convert numbers
        if (!debtId) {
            data.account_id = parseInt(data.account_id);
            data.original_amount = parseFloat(data.original_amount);
        }
        data.current_balance = parseFloat(data.current_balance);
        if (data.interest_rate) data.interest_rate = parseFloat(data.interest_rate);
        if (data.monthly_payment) data.monthly_payment = parseFloat(data.monthly_payment);

        // Remove empty values for updates
        if (debtId) {
            Object.keys(data).forEach(key => {
                if (data[key] === '' || data[key] === null) {
                    delete data[key];
                }
            });
            // Don't send these fields on update
            delete data.account_id;
            delete data.debt_type;
            delete data.currency_code;
            delete data.original_amount;
            delete data.start_date;
        }

        try {
            const url = debtId ? `/api/debts/${debtId}` : '/api/debts/';
            const method = debtId ? 'PATCH' : 'POST';

            const response = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                closeDebtModal();
                loadDebts();
                alert(debtId ? 'Deuda actualizada exitosamente' : 'Deuda creada exitosamente');
            } else {
                const error = await response.json();
                alert('Error: ' + JSON.stringify(error.detail));
            }
        } catch (error) {
            alert(`Error al ${debtId ? 'actualizar' : 'crear'} deuda: ` + error.message);
        }
    });

    async function deleteDebt(id, name) {
        if (!confirm(`¿Estás seguro de eliminar la deuda "${name}"?`)) return;

        try {
            const response = await fetch(`/api/debts/${id}`, { method: 'DELETE' });
            if (response.ok) {
                loadDebts();
                alert('Deuda eliminada');
            } else {
                alert('Error al eliminar deuda');
            }
        } catch (error) {
            alert('Error: ' + error.message);
        }
    }

    let currentDebtId = null;

    async function viewDebtDetails(id) {
        currentDebtId = id;
        try {
            const [debtRes, paymentsRes] = await Promise.all([
                fetch(`/api/debts/${id}?include_payments=true`),
                fetch(`/api/debts/${id}/payments`)
            ]);

            const debt = await debtRes.json();
            const payments = await paymentsRes.json();

            displayDebtDetails(debt, payments);
            document.getElementById('debtDetailsModal').classList.remove('hidden');
        } catch (error) {
            console.error('Error loading debt details:', error);
            alert('Error al cargar detalles de la deuda');
        }
    }

    function displayDebtDetails(debt, payments) {
        const typeLabels = {
            'credit_card': '💳 Tarjeta de Crédito',
            'credit_loan': '💰 Préstamo Personal',
            'mortgage': '🏠 Hipoteca'
        };

        document.getElementById('debtDetailsTitle').textContent = debt.name;
        document.getElementById('debtDetailsSubtitle').textContent =
            `${typeLabels[debt.debt_type] || debt.debt_type}${debt.institution ? ' - ' + debt.institution : ''}`;

        const progressPercent = debt.paid_percentage || 0;
        const symbol = debt.currency_code === 'USD' ? 'US$' : '$';
        const decimals = debt.currency_code === 'USD' ? 2 : 0;

        let html = `
            <!-- Summary Section -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-red-50 border border-red-200 rounded-lg p-4">
                    <p class="text-sm text-gray-600">Saldo Actual</p>
                    <p class="text-3xl font-bold text-red-600 mt-1">
                        ${symbol}${debt.current_balance.toLocaleString('es-CO', {minimumFractionDigits: decimals, maximumFractionDigits: decimals})}
                    </p>
                </div>
                <div class="bg-gray-50 border border-gray-200 rounded-lg p-4">
                    <p class="text-sm text-gray-600">Monto Original</p>
                    <p class="text-3xl font-bold text-gray-800 mt-1">
                        ${symbol}${debt.original_amount.toLocaleString('es-CO', {minimumFractionDigits: decimals, maximumFractionDigits: decimals})}
                    </p>
                </div>
                <div class="bg-green-50 border border-green-200 rounded-lg p-4">
                    <p class="text-sm text-gray-600">Total Pagado</p>
                    <p class="text-3xl font-bold text-green-600 mt-1">
                        ${symbol}${(debt.original_amount - debt.current_balance).toLocaleString('es-CO', {minimumFractionDigits: decimals, maximumFractionDigits: decimals})}
                    </p>
                </div>
            </div>

            <!-- Progress Bar -->
            <div>
                <div class="flex justify-between text-sm text-gray-600 mb-2">
                    <span class="font-semibold">${progressPercent.toFixed(1)}% pagado</span>
                    <span class="font-semibold">${(100 - progressPercent).toFixed(1)}% restante</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-4">
                    <div class="bg-green-600 h-4 rounded-full transition-all duration-500" style="width: ${progressPercent}%"></div>
                </div>
            </div>

            <!-- Details Grid -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 bg-gray-50 rounded-lg p-4">
                ${debt.interest_rate ? `
                    <div>
                        <p class="text-sm text-gray-600">Tasa de Interés</p>
                        <p class="text-lg font-semibold text-gray-800">${debt.interest_rate}% anual</p>
                    </div>
                ` : ''}
                ${debt.monthly_payment ? `
                    <div>
                        <p class="text-sm text-gray-600">Cuota Mensual</p>
                        <p class="text-lg font-semibold text-gray-800">${symbol}${debt.monthly_payment.toLocaleString('es-CO', {minimumFractionDigits: decimals})}</p>
                    </div>
                ` : ''}
                ${debt.minimum_payment ? `
                    <div>
                        <p class="text-sm text-gray-600">Pago Mínimo</p>
                        <p class="text-lg font-semibold text-gray-800">${symbol}${debt.minimum_payment.toLocaleString('es-CO', {minimumFractionDigits: decimals})}</p>
                    </div>
                ` : ''}
                ${debt.credit_limit ? `
                    <div>
                        <p class="text-sm text-gray-600">Límite de Crédito</p>
                        <p class="text-lg font-semibold text-gray-800">${symbol}${debt.credit_limit.toLocaleString('es-CO', {minimumFractionDigits: decimals})}</p>
                    </div>
                ` : ''}
                ${debt.credit_limit ? `
                    <div>
                        <p class="text-sm text-gray-600">Utilización</p>
                        <p class="text-lg font-semibold text-gray-800">${(debt.utilization_percentage || 0).toFixed(1)}%</p>
                    </div>
                ` : ''}
                <div>
                    <p class="text-sm text-gray-600">Fecha de Inicio</p>
                    <p class="text-lg font-semibold text-gray-800">${debt.start_date}</p>
                </div>
                ${debt.due_date ? `
                    <div>
                        <p class="text-sm text-gray-600">Fecha de Vencimiento</p>
                        <p class="text-lg font-semibold text-gray-800">${debt.due_date}</p>
                    </div>
                ` : ''}
                ${debt.payment_day ? `
                    <div>
                        <p class="text-sm text-gray-600">Día de Pago</p>
                        <p class="text-lg font-semibold text-gray-800">Día ${debt.payment_day}</p>
                    </div>
                ` : ''}
                <div>
                    <p class="text-sm text-gray-600">Estado</p>
                    <p class="text-lg font-semibold ${debt.is_active ? 'text-green-600' : 'text-gray-400'}">
                        ${debt.is_active ? '✓ Activa' : '✗ Inactiva'}
                    </p>
                </div>
            </div>

            ${debt.notes ? `
                <div class="bg-blue-50 border border-blue-200 rounded-lg p-4">
                    <p class="text-sm font-semibold text-gray-700 mb-2">Notas</p>
                    <p class="text-gray-800">${debt.notes}</p>
                </div>
            ` : ''}

            <!-- Payment History -->
            <div class="border-t pt-6">
                <h4 class="text-lg font-semibold text-gray-800 mb-4">Historial de Pagos</h4>
                ${payments && payments.length > 0 ? `
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Fecha</th>
                                    <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">Monto</th>
                                    <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">Principal</th>
                                    <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">Interés</th>
                                    <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">Saldo Después</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Notas</th>
                                </tr>
                            </thead>
                            <tbody class="bg-white divide-y divide-gray-200">
                                ${payments.map(payment => `
                                    <tr class="hover:bg-gray-50">
                                        <td class="px-4 py-3 text-sm text-gray-900">${payment.payment_date}</td>
                                        <td class="px-4 py-3 text-sm text-right font-semibold text-green-600">
                                            ${symbol}${payment.amount.toLocaleString('es-CO', {minimumFractionDigits: decimals})}
                                        </td>
                                        <td class="px-4 py-3 text-sm text-right text-gray-600">
                                            ${payment.principal ? symbol + payment.principal.toLocaleString('es-CO', {minimumFractionDigits: decimals}) : '-'}
                                        </td>
                                        <td class="px-4 py-3 text-sm text-right text-gray-600">
                                            ${payment.interest ? symbol + payment.interest.toLocaleString('es-CO', {minimumFractionDigits: decimals}) : '-'}
                                        </td>
                                        <td class="px-4 py-3 text-sm text-right text-gray-900">
                                            ${symbol}${payment.balance_after.toLocaleString('es-CO', {minimumFractionDigits: decimals})}
                                        </td>
                                        <td class="px-4 py-3 text-sm text-gray-600">${payment.notes || '-'}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                ` : `
                    <p class="text-gray-500 text-center py-8 bg-gray-50 rounded-lg">No hay pagos registrados</p>
                `}
            </div>
        `;

        document.getElementById('debtDetailsContent').innerHTML = html;
    }

    function closeDebtDetailsModal() {
        document.getElementById('debtDetailsModal').classList.add('hidden');
        currentDebtId = null;
    }

    function editDebtFromDetails() {
        if (currentDebtId) {
            closeDebtDetailsModal();
            editDebt(currentDebtId);
        }
    }

    // Load debts on page load
    document.addEventListener('DOMContentLoaded', loadDebts);
</script>
{% endblock %}
